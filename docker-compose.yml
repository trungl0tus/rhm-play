services:
  postgres:
    image: postgres:16-alpine
    container_name: rhmplay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rhmplay
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - rhmplay_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d rhmplay"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  rhmplay_pgdata:
    name: rhmplay_pgdata
